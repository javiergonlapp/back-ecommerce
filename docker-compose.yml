version: '3.8'

services:

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: javier-shop-backend
    ports:
      - "3000:3000"
    env_file:
      - ./back/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  seed:
    build:
      context: ./back
      dockerfile: Dockerfile.seed
    container_name: javier-shop-seed
    env_file:
      - ./back/.env
    depends_on:
      backend:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: javier-shop-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: javier-shop-network
